name: smoke

# Safe-by-construction: this workflow does not consume any user-controlled
# GitHub context inputs (no github.event.* references, no issue/PR body text
# interpolated into run: commands). Only `${{ matrix.os }}` is used, which is
# a fixed enum defined below — not user-reachable.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: shell syntax check
        run: |
          bash -n hats
          bash -n install.sh
          bash -n tests/smoke.sh

      - name: run smoke tests
        run: ./tests/smoke.sh

      - name: surface commands (basic smoke)
        run: |
          chmod +x hats
          ./hats help >/dev/null
          ./hats version
          ./hats completion bash | head -3
          ./hats completion zsh  | head -3

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck (info severity — blocking)
        # info covers warning + error severities too, so this is the
        # tightest blocking gate we run. Style-level (-S style) stays
        # unreached for now.
        run: |
          shellcheck --version
          shellcheck -S info hats install.sh tests/smoke.sh

  smoke-macos-bsd:
    # Pure-BSD userland lane. The default macos-latest runners ship
    # /usr/local/bin + /opt/homebrew/bin ahead of /usr/bin on PATH, which
    # means GNU coreutils / grep / sed shadow the BSD versions actual
    # macOS users have. That masked the `grep -oP` BSD-incompat fixed in
    # commit 48fc27e — the bug only surfaced at user-time. This job runs
    # smoke under pure BSD tooling so the next such regression fails at
    # CI time.
    #
    # Safe-by-construction: no github.event.* interpolation; all run:
    # blocks operate on checked-out repo content + PATH-scoping only.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: scrub PATH of Homebrew / GNU prefixes
        run: |
          echo "PATH=/usr/bin:/bin:/usr/sbin:/sbin" >> "$GITHUB_ENV"

      - name: report active userland
        run: |
          echo "PATH=$PATH"
          command -v grep && grep --version 2>&1 | head -1 || true
          command -v sed  && sed --version  2>&1 | head -1 || true
          command -v bash && bash --version | head -1 || true

      - name: shell syntax check (BSD bash)
        run: |
          bash -n hats
          bash -n install.sh
          bash -n tests/smoke.sh

      - name: run smoke tests (BSD userland)
        run: ./tests/smoke.sh

      - name: surface commands (basic smoke, BSD userland)
        run: |
          chmod +x hats
          ./hats help >/dev/null
          ./hats version
          ./hats completion bash | head -3
          ./hats completion zsh  | head -3
